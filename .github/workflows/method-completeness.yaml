name: method-completeness

# Static gate: every registered method must ship with a brief,
# property tests, and an illustration. The check is a ~2 s static
# scan of the registry against the file tree; it runs on every PR.
#
# The illustration *smoke runs* (`python -m ...illustrations.* --smoke`)
# moved to `ci-full.yaml` because each takes 5-30 s and they're
# integration regressions, not completeness gates.

on:
  pull_request:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

concurrency:
  group: completeness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  completeness:
    name: brief + tests + illustration per method
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify brief + property tests + illustration per registered method
        run: python tools/check_method_completeness.py
