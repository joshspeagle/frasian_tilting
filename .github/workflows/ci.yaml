name: ci

# Fast tier: runs on every PR + branch push. Targets ~3 min wall.
# Excludes the slow MC-heavy tier (`slow` mark) and the nightly L5
# cross-product. The full tier (incl. slow + L4 illustration smoke)
# lives in `ci-full.yaml` and runs on main pushes / nightly cron /
# manual dispatch.

on:
  pull_request:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest L0-L4 (not slow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest L0-L4 excluding slow + nightly
        run: python -m pytest -m "not L5 and not slow" -n auto -q
