# Phase G conditional learned-η for the Normal-Normal sandbox + fisher_rao.
# Counterpart to canonical_normal_normal_{powerlaw,ot}_v4. Stage C of the
# FR PR (see docs/superpowers/specs/2026-05-11-fisher-rao-tilting-design.md
# and docs/superpowers/plans/2026-05-11-fisher-rao-tilting.md).

prior_class: normal
model_class: normal_normal
hyperparam_distribution:
  prior:
    loc:   { dist: uniform,    low: -2.0, high: 2.0 }
    scale: { dist: loguniform, low: 0.2,  high: 5.0 }
  lik:
    sigma: { dist: loguniform, low: 0.5,  high: 2.0 }
theta_distribution:
  # σ₀-anchored (PRIOR's σ₀, not the likelihood's σ):
  # per batch element, θ ~ U(μ₀ − K·σ₀, μ₀ + K·σ₀).
  # Matches the powerlaw and ot siblings; canonical training distribution.
  type: sigma_anchored_uniform
  K: 5.0
theta_grid_lo: -30.0
theta_grid_hi:  30.0
scheme: fisher_rao
statistic: waldo
n_grid: 401
n_lhs: 10000
seed: 42
n_data: 1
# FR is geodesically complete on the Gaussian half-plane (Cartan-Hadamard;
# σ(η) > 0 for all finite η ∈ ℝ per deriver A.C2). training_output_bounds
# is None on FR — match PL/OT and let EtaNet output any η. The
# eta_explore_box is widened to [-5, 5] vs PL/OT's default; FR has no
# eta_max admissibility so a wider exploration is safe.
eta_explore_box: [-5.0, 5.0]
name: canonical_normal_normal_fisher_rao_v4
description: |
  Phase G conditional learned-η for Fisher-Rao (Levi-Civita / information-
  geometric geodesic) on the Normal-Normal sandbox. Stage C of the FR PR.

  Trained over the (prior_hp, lik_hp) range above; the selector dispatches
  per-inference and refuses out-of-range hyperparams.

  Three loss heads (integrated_p, cd_variance, static_width) trained
  sequentially via `scripts.train_learned_eta`. ~5 min CPU per head.
  Use the resulting checkpoints to populate the fr_learned_intp /
  fr_learned_cd_var / fr_learned_static_w audit flavors (currently
  commented out of `_FLAVORS` in scripts/run_wald_audit.py pending
  this training).
