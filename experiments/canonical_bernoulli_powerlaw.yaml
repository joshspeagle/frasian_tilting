# Canonical Bernoulli + Beta experiment for the Phase 4 learned-η selector.
# First non-Normal-Normal training fixture — exercises the generic grid
# tilted-pvalue path (`pvalue_jax.generic_grid_tilted_pvalue`) and the
# Phase 4c selector loosening.
#
# n_data > 1 is required: a single Bernoulli flip carries no posterior
# signal (Beta(α + 1, β) vs Beta(α, β + 1) — the EtaNet has nothing to
# learn). 16 observations per θ matches the Bernoulli regression smoke
# tests in `tests/regression/test_*_bernoulli_smoke.py`.

scheme: power_law
statistic: waldo
prior:
  type: beta
  alpha: 2.0
  beta: 2.0
model:
  type: bernoulli
theta_distribution:
  type: uniform
  low: 0.05
  high: 0.95
n_grid: 401
n_lhs: 2000
n_data: 16
eta_explore_box: [-2.0, 2.0]
seed: 42
name: canonical_bernoulli_powerlaw
description: |
  Bernoulli + Beta(2, 2) sandbox with the power_law / WALDO cell.
  θ_true uniform on (0.05, 0.95) — interior of the Bernoulli
  parameter space. The smaller eta_explore_box reflects the
  power_law admissibility region observed empirically on Bernoulli;
  the actual admissible region is learned by ValidityNet.
