# Phase G conditional learned-η for Bernoulli + Beta + MixtureTilting.
# First non-Normal-Normal mixture fixture. n_data=16: a single Bernoulli
# flip carries no posterior signal.

prior_class: beta
model_class: bernoulli
hyperparam_distribution:
  prior:
    alpha: { dist: loguniform, low: 0.5, high: 10.0 }
    beta:  { dist: loguniform, low: 0.5, high: 10.0 }
  lik: {}    # BernoulliModel.hyperparam_dim == 0
theta_distribution:
  type: uniform
  low: 0.05
  high: 0.95
scheme: mixture
statistic: waldo
n_grid: 401
n_lhs: 10000
seed: 42
n_data: 16
# η-aux explore range. Mixture's admissible η is [0, eta_max(D, prior,
# model)] with eta_max varying; using [-0.5, 3.0] gives ValidityNet
# negative-side and tail-side samples to learn the boundary edge.
# Narrower than PL Bernoulli's [-2, 2] because mixture eta < 0 is
# rapidly invalid; deeper on the positive side because eta_max can
# exceed 1 at low conflict.
eta_explore_box: [-0.5, 3.0]
name: canonical_bernoulli_mixture_v4
description: |
  Phase G conditional learned-η for MixtureTilting on Bernoulli + Beta.
  Pairs with canonical_bernoulli_powerlaw_v4.yaml; same (α, β) hp
  distribution + n_data=16. Training routes through `("mixture",
  "generic")` JAX kernel (`mixture_grid_tilted_pvalue`) added 2026-05-10.
