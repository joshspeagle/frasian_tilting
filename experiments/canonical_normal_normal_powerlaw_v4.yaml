# Phase G conditional learned-η for the Normal-Normal sandbox + power_law.
# Trained over a range of (μ₀, σ₀, σ); selector dispatches on the prior
# + likelihood passed at inference time (within the trained ranges).

prior_class: normal
model_class: normal_normal
hyperparam_distribution:
  prior:
    loc:   { dist: uniform,    low: -2.0, high: 2.0 }
    scale: { dist: loguniform, low: 0.2,  high: 5.0 }
  lik:
    sigma: { dist: loguniform, low: 0.5,  high: 2.0 }
theta_distribution:
  # σ-anchored: per batch element, θ ~ U(μ₀ − K·σ₀, μ₀ + K·σ₀).
  # Concentrates training mass where the prior is informative.
  # Replaces the previous Uniform[-10, 10] which caused the model
  # to collapse to η ≈ 1 (Wald) — high-conflict samples (D far
  # from any μ₀) dominated the gradient, drowning out the prior-
  # near samples that would push η < 1. With K=5 the model recovers
  # v3's beats-Wald headline (3.6 vs 3.92 at the demo slice) and
  # exceeds it on the hp average (24/24 hp triples beat Wald).
  type: sigma_anchored_uniform
  K: 5.0
# Absolute integration grid bounds (must cover μ₀ ± K·σ₀ across the
# full hp range plus a buffer for integrated-p tails).
theta_grid_lo: -30.0
theta_grid_hi:  30.0
scheme: power_law
statistic: waldo
n_grid: 401
n_lhs: 10000
seed: 42
n_data: 1
name: canonical_normal_normal_powerlaw_v4
description: |
  Phase G conditional learned-η; replaces the v3 fixed-prior fixture.
  Sampling ranges (μ₀ ∈ [-2, 2], σ₀ ∈ [0.2, 5], σ ∈ [0.5, 2]) span
  realistic research configurations; selector refuses inference outside
  these ranges.
