# Phase G conditional learned-η for Bernoulli + Beta.
# First non-Normal-Normal v4 fixture. n_data=16: a single Bernoulli
# flip carries no posterior signal, so the conditional EtaNet has
# nothing to learn at n_data=1.

prior_class: beta
model_class: bernoulli
hyperparam_distribution:
  prior:
    alpha: { dist: loguniform, low: 0.5, high: 10.0 }
    beta:  { dist: loguniform, low: 0.5, high: 10.0 }
  lik: {}    # BernoulliModel.hyperparam_dim == 0
theta_distribution:
  type: uniform
  low: 0.05
  high: 0.95
scheme: power_law
statistic: waldo
n_grid: 401
n_lhs: 10000
seed: 42
n_data: 16
# η-aux explore range. Bernoulli + power_law's admissible η is much
# narrower than the NN sandbox's; the v3 fixture used [-2, 2] and
# Phase G keeps that bound. With the default [-5, 5] the entire aux
# batch lands in the invalid region and Head B trivializes.
eta_explore_box: [-2.0, 2.0]
name: canonical_bernoulli_powerlaw_v4
description: |
  Phase G conditional learned-η; replaces the v3 fixed-Beta(2,2)
  fixture. (α, β) ∈ [0.5, 10] log-uniform spans uniform-ish through
  strongly-informative priors.
