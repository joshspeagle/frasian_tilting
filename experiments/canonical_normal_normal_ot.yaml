# Canonical Normal-Normal experiment for the Phase E learned-η selector,
# using OT tilting + WALDO. Counterpart to canonical_normal_normal_powerlaw.

scheme: ot
statistic: waldo
prior:
  type: normal
  loc: 0.0
  scale: 1.0
model:
  type: normal_normal
  sigma: 1.0
theta_distribution:
  type: uniform
  # The dynamic-CI scan in `tilting/_dynamic.py::dynamic_ci_scan` queries
  # η at θ ≈ μ₀ ± 2|Δ|, which can extend to θ ≈ ±12 at the test's
  # conflict band. Training with too narrow a θ range causes the runtime
  # selector to extrapolate and the calibration suite to flake. The
  # power_law analogue is less sensitive because its admissibility curve
  # is monotone in |Δ|; OT's η ≈ const-ish profile means a uniform-θ
  # learner needs to see the tails. Pinned at [-10, 10] post-Equinox-port.
  low: -10.0
  high: 10.0
n_grid: 401
n_lhs: 10000
eta_explore_box: [-0.5, 1.5]
seed: 42
name: canonical_normal_normal_ot
description: |
  Canonical Normal-Normal sandbox at w=0.5 with the ot / WALDO cell.
  eta_explore_box is asymmetric since OT's natural η range is roughly
  (0, 1+) — but the box is wider on the upper side to also probe the
  invalid region for Head B.
