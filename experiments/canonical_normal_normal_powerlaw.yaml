# Canonical Normal-Normal experiment for the Phase E learned-η selector.
# Used as the smoke fixture for power_law tests; matches the legacy
# `learned_eta_power_law_v0_smoke.pt` setup (w=0.5 since σ=σ₀=1).

scheme: power_law
statistic: waldo
prior:
  type: normal
  loc: 0.0
  scale: 1.0
model:
  type: normal_normal
  sigma: 1.0
theta_distribution:
  type: uniform
  low: -5.0
  high: 5.0
n_grid: 401
n_lhs: 10000
eta_explore_box: [-5.0, 5.0]
seed: 42
name: canonical_normal_normal_powerlaw
description: |
  Canonical Normal-Normal sandbox at w=0.5 with the power_law /
  WALDO cell. θ_true is uniform on ±5σ around the prior mean.
